<body>
    <button onclick="make()">SEE!</button>
    <div id="div_mensagem"></div>

<script>
    function make() {
            let soma = 0
            for (let i = 1; i <= 100; i++){
                soma += i
            }
            console.log(soma)
            div_mensagem.innerHTML = `O total da soma é: ${soma}`;
        }

</script>
