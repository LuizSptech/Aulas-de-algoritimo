<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input placeholder="Quantos depósitos você fez ao banco" id="ipt_inserir">
    <br>
    <input placeholder="Valor inserido" id="ipt_valor">

    <button onclick="Grana()">Acompanhar grana</button>
    <div id="div_mensagem"></div>
</body>

</html>


<script>

    function Grana() {
        div_mensagem.innerHTML = ''
        let qtd_depositos = Number(ipt_inserir.value);
        let valor = Number(ipt_valor.value);

        for (let i = 0; i < qtd_depositos; i++) {

            if((i + 1) % 3 === 0){ div_mensagem.innerHTML += `${i + 1}° Mês R${(valor * (i + 1) + (valor * (1 * 100))).toFixed(2)}<br>`}
            else{div_mensagem.innerHTML += `${i + 1}° Mês R${(valor * (i + 1)).toFixed(2)}<br>`}

            

            if (i == (qtd_depositos - 1)) {
                div_mensagem.innerHTML += `<br>Total guardado: R${(valor * (i + 1)).toFixed(2)}`
            }
        }

    }
/*Refaça o programa anterior de tal forma que: 

A cada 3 depósitos o banco dê um bônus de 1% sobre o valor acumulado após o depósito. Ex:   

    1º Mês: R$ 500.00   

    2º Mês: R$ 1000.00   

    3º Mês: R$ 1515.00   

    4º Mês: R$ 2015.00   

    5º Mês: R$ 2515.00   

    6º Mês: R$ 3045.15   

    Total guardado: R$3045.15   

Note que nos meses 3 e 6, o valor aumentou em 1% do total após o depósito*/
</script>
