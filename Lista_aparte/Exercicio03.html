<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <button onclick="make()">see</button>
    <div id="div_mensagem"></div>
</body>
</html>



<script>
function make(){
    let mensagem1 = 'numero impar'
    let mensagem = 'numero par'
    for(let i = 1; i <= 20; ++i){
        if(i % 2 === 0){
            console.log((i)), div_mensagem.innerHTML += `${i} ${mensagem}<br>`
        }else {console.log((i)), div_mensagem.innerHTML += `${i} ${mensagem1}<br>`}
    }
    }
/*3. Filtro de Números (Pares e Ímpares)

Objetivo: Combinar o for com condicionais (if).

    Exercício: Percorra os números de 1 a 20. Para cada número, verifique se ele é par ou ímpar.

    Saída esperada: "O número 1 é ímpar", "O número 2 é par", etc.*/</script>
