<body>
    <button onclick="make()"> 1 a 10</button>
    <div id="div_mensagem"></div>

<script>
    function make() {
        for(let i = 1; i <= 10; ++i){
            console.log((i + 10) - 10)
            div_mensagem.innerHTML += `<br>${(i + 10 )- 10}`

        }  
    }
