<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio05</title>
</head>
<body>
    <button onclick="number()">Números cabalísticos</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
function number(){
    let contador = 0
    let numero = [3,4,7,10,12]
    let coisa = 0
    while (contador < 30){
        contador++
        coisa++
        if (coisa == numero){
        coisa.splice(numero)
        div_mensagem.innerHTML += `${coisa}<br>`
    }
        }
    }

</script>
