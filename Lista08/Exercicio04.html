<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio04</title>
</head>
<body>

<button onclick="pares()">S2 Pares</button>
<div id="div_mensagem"></div>

</body>
</html>

<script>
function pares(){
    let numero = 0
    contador = 0
    while (contador < 100){
        contador ++
        numero ++
        if (numero % 2 === 0){
            div_mensagem.innerHTML += `${numero}<br>`
        }
    }

}


</script>
