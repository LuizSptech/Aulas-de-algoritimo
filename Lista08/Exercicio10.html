<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input placeholder="quantas voltas tera a corrida" id="ipt_voltas">
    <button onclick="vrum()">Iniciar corrida</button>
    <div id="div_mensagem"></div>
    
</body>
</html>

<script>
    function vrum(){
        let i = 0
        let voltas = Number(ipt_voltas.value)
        while(i < voltas){
            i++
            div_mensagem.innerHTML += `Carro dando a ${i} volta<br>`

        }

    }
</script>
