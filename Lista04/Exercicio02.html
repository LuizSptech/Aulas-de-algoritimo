<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira sua renda familiar mensal</p>
    <input type="text" id="rendaMensal">
    <button onclick="Analisar_Renda()">Analisar Renda</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function Analisar_Renda(){
    let renda = Number(rendaMensal.value)
    let classe = ''

        if(renda <= 250){
            classe = 'Classe E'
        } else if (renda <= 900){
            classe = 'Classe D'
        } else if (renda < 2500){
            classe = 'Classe C'
        } else if (renda < 9500 ){
            classe = 'Clase B'
        } else if (renda >= 9500){
            classe = 'Classe A'
        }
        div_mensagem.innerHTML = classe

    }
</script>
