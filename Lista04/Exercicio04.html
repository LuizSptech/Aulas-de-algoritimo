<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira seu peso</p>
    <input type="text" id="ipt_peso">
    <button onclick="Peso()">Analisar Peso</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function Peso(){
        let peso = Number(ipt_peso.value)
        let mensagem = ''
        if (peso <= 13.5){
            mensagem = 'Abaixo do peso'
        } else if (peso > 21.2){
            mensagem = 'Acima do peso'
        }else if (peso <= 21.2){
            mensagem = 'Peso na média'
        }else if (peso == 18.3){
            mensagem = 'Peso Perfeito'
        }

        div_mensagem.innerHTML = `Você esta ${mensagem}`
    }

</script>
