<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Digite seu nome <input type="text" id="ipt_nome"></p>
    <p>Tipo do pokémon <input type="text" id="ipt_poke"></p>
    <button onclick="mensagem()">Pesquisar</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    function mensagem() {
        let tipo = ipt_poke.value
        let nome = ipt_nome.value
        if (tipo == 'fogo') {
            resposta.innerHTML = 
            `Olá, ${nome}, aqui está as informações sobre o tipo Fogo <br>
            - Ele é forte contra Planta; <br>
            - Ele é fraco contra Fogo, Água e Dragão; <br>
            - Ele é resistente contra Fogo e Planta;<br>
            - Ele não é resistente contra Água.<br>
            Boa sorte em sua jornada Pokémon!`
        } else if (tipo == agua){
            resposta.innerHTML = 
            `Olá, ${nome}, aqui está as informações sobre o tipo Água <br>
            - Ele é forte contra Fogo;<br>
            - Ele é fraco contra Água, Planta e Dragão;<br>
            - Ele é resistente contra Fogo e Água;<br>
            - Ele não é resistente contra Planta e Elétrico.<br>
            Boa sorte em sua jornada Pokémon!`

        } else if (tipo == planta){
            resposta.innerHTML = 
            `Olá, ${nome}, aqui está as informações sobre o tipo Planta <br>
            - Ele é forte contra Água;<br>
            - Ele é fraco contra Fogo, Planta e Dragão;<br>
            - Ele é resistente contra Água, Planta e Elétrico;<br>
            - Ele não é resistente contra Fogo.<br>
            Boa sorte em sua jornada Pokémon!`

        } else if (tipo == eletrico){
            resposta.innerHTML = 
            `Olá, ${nome}, aqui está as informações sobre o tipo Elétrico <br>
                - Ele é forte contra Água;<br>
            - Ele é fraco contra Planta, Elétrico e Dragão;<br>
            - Ele é resistente contra Elétrico;<br>
            - Ele não é resistente contra nada.<br>
            Boa sorte em sua jornada Pokémon!`

        } else if (tipo == dragao){
            resposta.innerHTML = 
            `Olá, ${nome}, aqui está as informações sobre o tipo Dragão <br>
            - Ele é forte contra Dragão;<br>
            - Ele não é fraco contra nada;<br>
            - Ele é resistente contra Fogo, Água, Planta e Elétrico;<br>
            - Ele não é resistente contra Dragão.<br>
            Boa sorte em sua jornada Pokémon!`

        } else {
            resposta.innerHTML = "Pesquisa inválida, esse tipo não existe"
        }
    }
</script>
