<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Primeira nota <input type="text" id="ipt_nota1"></p>
    <p>Segunda nota <input type="text" id="ipt_nota2"></p>
    <button onclick="calcular()">Verificar situação</button>

</body>
</html>
<script>
    function calcular(){
        let media = (Number(ipt_nota1.value) + Number(ipt_nota2.value))/2
        if (media>=6){
            alert("Parabéns, aprovado!")
        } else {
            alert("Tente outra vez...")
        }
    }
</script>
