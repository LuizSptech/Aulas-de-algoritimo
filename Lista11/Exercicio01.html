<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="make()">Sortear</button>
    <div id="div_mensagem"></div>
</body>
</html>


<script>
    function make(){
        let random = Math.random() * (0.9999 - 0) + 0 
        let mensagem = 0
        if(random >= 0.5){
            mensagem = 'Eu arredondaria para 1'
        }else {mensagem = 'Eu arredondaria para 0'}
        div_mensagem.innerHTML = `${mensagem}<br> ${random.toFixed(4)}`
    }
</script>
