<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #div_mensagem {
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            font-size: 50px;
        }
    </style>
</head>
<body>

    
    <button onclick="make()">Roll</button>
    <div id="div_mensagem">
      
    </div>
</body>
</html>

<script>
    function make(){
        let random = Math.random() * (20 - 1) + 1
        div_mensagem.innerHTML = `${random.toFixed(0)}`
    }
</script>
