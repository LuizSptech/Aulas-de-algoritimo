<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="make()">ver nota</button>
    <div id="div_mensagem"></div>

</body>

<script>
    function make(){
        let nota_random = Math.random() * (10 -0) + 0
        div_mensagem.innerHTML = `${nota_random.toFixed(1)}`
    }
</script>
