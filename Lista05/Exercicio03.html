<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select name="Combo1" id="ipt_combo1">
        <option value="comum">Comum</option>
        <option value="estudante">Estudante</option>
        <option value="idoso">Idoso/PNE</option>
    </select>
    

    <select name="Combo2" id="ipt_combo2">
        <option value="passagem_unica">Passagem única</option>
        <option value="passagem_integra">Passagem Integração</option>
    </select>
    <button onclick="simular()">Simular Preço</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function simular(){
        let tipo = ipt_combo1.value;
        let passagem = ipt_combo2.value;
        let valor= 0;
        
        
        if (tipo == 'comum' && passagem =='passagem_unica'){
            valor = 4.40;
        }else if (tipo == 'comum' && passagem =='passagem_integra'){
            valor = 5.90;
        }else if (tipo == 'estudante' && passagem == 'passagem_unica'){
            valor = 4.40 / 2;
        }else if (tipo == 'estudante' && passagem == 'passagem_integra'){
            valor = 5.90 / 2;}

        div_mensagem.innerHTML = `Valor da passagem é R$${valor.toFixed(2)}`;

    }

</script>
