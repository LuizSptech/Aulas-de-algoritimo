<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button  onclick="mostrarItens()">
        mostrar itens
    </button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function mostrarItens(){
        div_mensagem.innerHTML = '';
        let itens = ['Maçã','Banana','Morango'];
        for (let i = 0 ; i < itens.length; i++){
            div_mensagem.innerHTML += `${itens[i]}<br>`;
        
        }
    }
</script>
